<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LittleSnack - Замовлення їжі (Варіант 12)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo"><a href="index.html"
                    style="text-decoration: none; color: inherit;">Little<span>Snack</span></a></div>
            <nav id="main-nav">
                <ul>
                    <li><a href="#menu">Меню</a></li>
                    <li><a href="#cart">Кошик</a></li>
                    <li><a href="#orders">Мої замовлення</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">

        <section id="menu">
            <h1 class="section-title">Наше Меню</h1>
            <div class="dish-grid" id="menu-container">
                <!-- Динамічний контент за допомогою JS -->
            </div>
        </section>

        <section id="cart">
            <h2 class="section-title">Ваш Кошик</h2>
            <button onclick="toggleCartVisibility()" class="btn-secondary"
                style="margin-bottom: 15px;">Приховати/Показати Кошик</button>
            <div class="card" id="cart-card">
                <div class="cart-items" id="cart-container">
                    <!-- Динамічний контент за допомогою JS -->
                </div>

                <div class="cart-summary">
                    <div class="total">
                        <span><strong>Разом до сплати: </strong></span>
                        <span class="total-amount" id="cart-total">0 грн</span>
                    </div>
                    <a href="checkout.html" class="btn-order" id="checkout-btn"
                        style="text-decoration: none; display: inline-block;">Оформити замовлення</a>
                </div>
            </div>
        </section>

        <section id="orders">
            <h2 class="section-title">Історія замовлень</h2>
            <div class="orders-list" id="orders-container">
                <!-- Динамічний контент за допомогою JS (цикл while) -->
            </div>
        </section>

    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Контакти</h3>
                    <p>Адреса: м. Львів, вул. Університетська, 1</p>
                    <p>Телефон: +380 32 123 45 67</p>
                    <p>Email: info@littlesnack.com</p>
                </div>
            </div>
            <div class="footer-copy">
                &copy; 2026 LittleSnack. Всі права захищені.
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
